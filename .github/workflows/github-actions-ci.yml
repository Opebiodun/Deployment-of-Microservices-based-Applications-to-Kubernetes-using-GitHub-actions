name: Socks Shop CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      destroy:
        description: 'Destroy all infrastructure instead of deploying'
        required: false
        default: 'false'

env:
  AWS_REGION: eu-west-2
  CLUSTER_NAME: micro-dev-eks-demo
  NODEGROUP_NAME: micro-dev-eks-ng-public

jobs:
  deploy:
    if: github.event.inputs.destroy != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure Terraform state bucket exists
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="sockshop-tfstate-$ACCOUNT_ID"
          echo "TF_STATE_BUCKET=$BUCKET" >> "$GITHUB_ENV"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            aws s3api create-bucket \
              --bucket "$BUCKET" \
              --region "$AWS_REGION" \
              --create-bucket-configuration LocationConstraint="$AWS_REGION"
            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
          else
            echo "Bucket $BUCKET already exists, skipping creation"
          fi

      - name: Install eksctl
        run: |
          curl --silent --location "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz" | tar xz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin

      - name: Ensure EKS cluster exists
        run: |
          if ! aws eks describe-cluster --name "$CLUSTER_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            eksctl create cluster \
              --name "$CLUSTER_NAME" \
              --region "$AWS_REGION" \
              --nodegroup-name "$NODEGROUP_NAME" \
              --node-type t2.medium \
              --nodes 2 \
              --managed
          else
            echo "Cluster $CLUSTER_NAME already exists, skipping creation"
          fi

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Deploy core microservices
        working-directory: kubernetes/micro-service
        run: |
          terraform init -input=false \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=micro-service/terraform.tfstate" \
            -backend-config="region=$AWS_REGION"

          if ! terraform state list 2>/dev/null | grep -qx 'kubernetes_namespace.kube-namespace'; then
            if kubectl get namespace sock-shop >/dev/null 2>&1; then
              echo "Namespace sock-shop already exists but isn't in state — importing"
              terraform import kubernetes_namespace.kube-namespace sock-shop
            fi
          fi

          NAMESPACE="sock-shop"
          RESOURCES=(
            "kubernetes_deployment|kube-carts-deployment|carts"
            "kubernetes_service|kube-carts-service|carts"
            "kubernetes_deployment|kube-carts-db-deployment|carts-db"
            "kubernetes_service|kube-carts-db-service|carts-db"
            "kubernetes_deployment|kube-catalogue-deployment|catalogue"
            "kubernetes_service|kube-catalogue-service|catalogue"
            "kubernetes_deployment|kube-catalogue-db-deployment|catalogue-db"
            "kubernetes_service|kube-catalogue-db-service|catalogue-db"
            "kubernetes_deployment|kube-front-end-deployment|front-end"
            "kubernetes_service|kube-front-end-service|front-end"
            "kubernetes_deployment|kube-orders-deployment|orders"
            "kubernetes_service|kube-orders-service|orders"
            "kubernetes_deployment|kube-orders-db-deployment|orders-db"
            "kubernetes_service|kube-orders-db-service|orders-db"
            "kubernetes_deployment|kube-payment-deployment|payment"
            "kubernetes_service|kube-payment-service|payment"
            "kubernetes_deployment|kube-queue-master-deployment|queue-master"
            "kubernetes_service|kube-queue-master-service|queue-master"
            "kubernetes_deployment|kube-rabbitmq-deployment|rabbitmq"
            "kubernetes_service|kube-rabbitmq-service|rabbitmq"
            "kubernetes_deployment|kube-session-db-deployment|session-db"
            "kubernetes_service|kube-session-db-service|cartsession-dbs"
            "kubernetes_deployment|kube-shipping-deployment|shipping"
            "kubernetes_service|kube-shipping-service|shipping"
            "kubernetes_deployment|kube-user-deployment|user"
            "kubernetes_service|kube-user-service|user"
            "kubernetes_deployment|kube-user-db-deployment|user-db"
            "kubernetes_service|kube-user-db-service|user-db"
          )

          for entry in "${RESOURCES[@]}"; do
            IFS='|' read -r type local_name k8s_name <<< "$entry"
            kube_kind="${type#kubernetes_}"
            address="$type.$local_name"
            if ! terraform state list 2>/dev/null | grep -qx "$address"; then
              if kubectl get "$kube_kind" "$k8s_name" -n "$NAMESPACE" >/dev/null 2>&1; then
                echo "Importing $address as $NAMESPACE/$k8s_name"
                terraform import "$address" "$NAMESPACE/$k8s_name"
              fi
            fi
          done

          terraform apply -input=false -auto-approve

      - name: Deploy nginx ingress controller
        working-directory: kubernetes/nginx-controller
        run: |
          terraform init -input=false \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=nginx-controller/terraform.tfstate" \
            -backend-config="region=$AWS_REGION"

          if ! terraform state list 2>/dev/null | grep -qx 'kubernetes_namespace.nginx-namespace'; then
            if kubectl get namespace nginx-ingress >/dev/null 2>&1; then
              echo "Namespace nginx-ingress already exists but isn't in state — importing"
              terraform import kubernetes_namespace.nginx-namespace nginx-ingress
            fi
          fi

          if ! terraform state list 2>/dev/null | grep -qx 'helm_release.ingress_nginx'; then
            if helm status ingress-nginx -n nginx-ingress >/dev/null 2>&1; then
              echo "Helm release ingress-nginx already exists but isn't in state — importing"
              terraform import helm_release.ingress_nginx nginx-ingress/ingress-nginx
            fi
          fi

          terraform apply -input=false -auto-approve

      - name: Deploy Prometheus monitoring stack
        working-directory: kubernetes/prometheus-helm
        run: |
          terraform init -input=false \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=prometheus-helm/terraform.tfstate" \
            -backend-config="region=$AWS_REGION"

          if ! terraform state list 2>/dev/null | grep -qx 'kubernetes_namespace.kube-namespace'; then
            if kubectl get namespace prometheus >/dev/null 2>&1; then
              echo "Namespace prometheus already exists but isn't in state — importing"
              terraform import kubernetes_namespace.kube-namespace prometheus
            fi
          fi

          if ! terraform state list 2>/dev/null | grep -qx 'helm_release.prometheus'; then
            if helm status prometheus -n prometheus >/dev/null 2>&1; then
              echo "Helm release prometheus already exists but isn't in state — importing"
              terraform import helm_release.prometheus prometheus/prometheus
            fi
          fi

          terraform apply -input=false -auto-approve

      - name: Deploy ingress rules
        working-directory: kubernetes/ingress-rule
        run: |
          terraform init -input=false \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=ingress-rule/terraform.tfstate" \
            -backend-config="region=$AWS_REGION"

          if ! terraform state list 2>/dev/null | grep -qx 'kubernetes_ingress_v1.micro-ingress'; then
            if kubectl get ingress sock-shop -n sock-shop >/dev/null 2>&1; then
              echo "Ingress sock-shop already exists but isn't in state — importing"
              terraform import kubernetes_ingress_v1.micro-ingress sock-shop/sock-shop
            fi
          fi

          if ! terraform state list 2>/dev/null | grep -qx 'kubernetes_ingress_v1.prome-ingress'; then
            if kubectl get ingress promethues-grafana -n prometheus >/dev/null 2>&1; then
              echo "Ingress promethues-grafana already exists but isn't in state — importing"
              terraform import kubernetes_ingress_v1.prome-ingress prometheus/promethues-grafana
            fi
          fi

          terraform apply -input=false -auto-approve

      - name: Verify deployment
        run: |
          kubectl get svc -n sock-shop
          kubectl get svc -n prometheus

  destroy:
    if: github.event.inputs.destroy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Terraform state bucket
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "TF_STATE_BUCKET=sockshop-tfstate-$ACCOUNT_ID" >> "$GITHUB_ENV"

      - name: Install eksctl
        run: |
          curl --silent --location "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz" | tar xz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Destroy ingress rules
        working-directory: kubernetes/ingress-rule
        run: |
          terraform init -input=false \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=ingress-rule/terraform.tfstate" \
            -backend-config="region=$AWS_REGION"
          terraform destroy -input=false -auto-approve

      - name: Destroy Prometheus monitoring stack
        working-directory: kubernetes/prometheus-helm
        run: |
          terraform init -input=false \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=prometheus-helm/terraform.tfstate" \
            -backend-config="region=$AWS_REGION"
          terraform destroy -input=false -auto-approve

      - name: Destroy nginx ingress controller
        working-directory: kubernetes/nginx-controller
        run: |
          terraform init -input=false \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=nginx-controller/terraform.tfstate" \
            -backend-config="region=$AWS_REGION"
          terraform destroy -input=false -auto-approve

      - name: Destroy core microservices
        working-directory: kubernetes/micro-service
        run: |
          terraform init -input=false \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=micro-service/terraform.tfstate" \
            -backend-config="region=$AWS_REGION"
          terraform destroy -input=false -auto-approve

      - name: Delete EKS cluster
        run: eksctl delete cluster --name "$CLUSTER_NAME" --region "$AWS_REGION"